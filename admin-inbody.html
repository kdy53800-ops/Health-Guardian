<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인바디 관리 — 건강지킴이 Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Admin Login Overlay ── */
    #adminLoginOverlay {
      position: fixed; inset: 0; z-index: 99999;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: none; align-items: center; justify-content: center;
    }
    .admin-login-card {
      background: white; border-radius: var(--radius-xl);
      padding: 40px 36px; width: 100%; max-width: 380px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    }
    .admin-login-logo { text-align: center; margin-bottom: 28px; }
    .admin-login-logo h2 { font-size: 1.2rem; font-weight: 800; color: var(--text); margin-top: 10px; }
    .admin-login-logo p  { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    .admin-err { color: #b91c1c; font-size: 0.82rem; margin-top: 6px; display: none; }
    .admin-err.show { display: block; }

    .admin-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: linear-gradient(135deg, var(--gold), #b8921a);
      color: #fff; font-size: 0.7rem; font-weight: 800;
      padding: 3px 9px; border-radius: 100px;
      letter-spacing: .05em; text-transform: uppercase; margin-left: 6px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-secondary);
    }
    .form-group input, .form-group select {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,70,128,0.1);
    }
    
    .file-drop-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface-2);
      margin-bottom: 20px;
    }
    .file-drop-area:hover, .file-drop-area.dragover {
      border-color: var(--primary);
      background: rgba(0,70,128,0.02);
    }
    .preview-image {
      max-width: 100%;
      max-height: 200px;
      margin-top: 10px;
      border-radius: var(--radius-md);
      display: none;
    }
    
    .record-list-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    .record-list-table th {
      text-align: left;
      padding: 10px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      border-bottom: 2px solid var(--border);
      background: var(--surface-2);
    }
    .record-list-table td {
      padding: 12px 10px;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    
    @media (max-width: 900px) {
      .form-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- 관리자 로그인 오버레이 -->
  <div id="adminLoginOverlay">
    <div class="admin-login-card">
      <div class="admin-login-logo">
        <div style="background:#fff;border-radius:16px;padding:6px;display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;box-shadow:0 2px 12px rgba(0,0,0,0.10);">
          <img src="images/logo.png" alt="건강지킴이 로고" style="width:68px;height:68px;object-fit:contain;border-radius:10px;" onerror="this.style.display='none'">
        </div>
        <h2>관리자 로그인</h2>
        <p>건강지킴이 관리자 전용 페이지입니다</p>
      </div>
      <div style="margin-top: 24px;">
        <button type="button" class="btn btn-block btn-lg" style="background:#03C75A; color:white; font-weight:700; border:none; display:flex; align-items:center; justify-content:center; gap:8px;" onclick="window.location.href='api/naver-login?redirect_to=' + encodeURIComponent(window.location.pathname)">
          네이버 아이디로 관리자 로그인
        </button>
        <p class="admin-err" id="adminErr" style="text-align:center; margin-top:12px;"></p>
        <p style="text-align:center;margin-top:16px;font-size:0.8rem;color:var(--text-muted);">
          <a href="index.html" style="color:var(--text-muted);text-decoration:underline;">← 일반 사용자 로그인 홈으로</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Admin Nav -->
  <nav class="top-nav">
    <a href="admin.html" class="nav-brand">
      <div class="nav-brand-icon" style="background:#fff;border-radius:8px;padding:3px;display:flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;"><img src="images/logo.png" alt="건강지킴이" style="width:32px;height:32px;object-fit:contain;" onerror="this.style.display='none'"></div>
      <span class="nav-brand-name">건강지킴이</span>
      <span class="admin-badge">⚙️ Admin</span>
    </a>
    <ul class="nav-links">
      <li><a href="admin.html">📊 관리 현황</a></li>
      <li><a href="admin-ranking.html">🏆 사용자 랭킹</a></li>
      <li><a href="admin-users.html">👥 사용자 관리</a></li>
      <li><a href="admin-inbody.html" class="active">💪 인바디 관리</a></li>
    </ul>
    <div class="nav-right">
      <div class="nav-user">
        <div class="nav-avatar" id="navAvatar">A</div>
        <span class="nav-username" id="navUsername">관리자</span>
      </div>
      <button class="btn-logout" onclick="adminLogout()">로그아웃</button>
    </div>
  </nav>

  <div class="app-layout">
    <main class="page-content fade-in">
      <div class="page-header" style="margin-bottom:24px;">
        <h1><div class="page-icon">💪</div> 인바디 관리</h1>
        <p class="subtitle">특별관리 대상자의 인바디 기록을 업로드하고 관리합니다.</p>
      </div>

      <div class="chart-card mb-20" style="padding: 24px;">
        <div class="form-group" style="margin-bottom: 20px; max-width: 400px;">
          <label>대상자 선택 (특별관리 대상자만 표시됩니다)</label>
          <select id="userSelect" onchange="loadUserRecords()">
            <option value="">사용자를 선택하세요...</option>
          </select>
        </div>

        <div id="uploadSection" style="display: none;">
          <h3 style="font-size: 1.1rem; font-weight: 800; margin-bottom: 16px; padding-top: 16px; border-top: 1px solid var(--border);">새 인바디 기록 업로드</h3>
          
          <div class="file-drop-area" id="dropArea" onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 2rem; margin-bottom: 10px;">📸</div>
            <div style="font-weight: 700; color: var(--text);">인바디 결과지 이미지 업로드</div>
            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">클릭하거나 이미지를 끌어다 놓으세요</div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
            <img id="imagePreview" class="preview-image" alt="미리보기">
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>측정일자</label>
              <input type="date" id="recordDate" required>
            </div>
            <div class="form-group">
              <label>체중 (kg)</label>
              <input type="number" id="weight" step="0.1" required>
            </div>
            <div class="form-group">
              <label>골격근량 (kg)</label>
              <input type="number" id="skeletalMuscle" step="0.1" required>
            </div>
            <div class="form-group">
              <label>체지방량 (kg)</label>
              <input type="number" id="bodyFatMass" step="0.1" required>
            </div>
            <div class="form-group">
              <label>BMI</label>
              <input type="number" id="bmi" step="0.1" required>
            </div>
            <div class="form-group">
              <label>체지방률 (%)</label>
              <input type="number" id="bodyFatPercent" step="0.1" required>
            </div>
            <div class="form-group">
              <label>세포외수분비 (ECW Ratio)</label>
              <input type="number" id="ecwRatio" step="0.001" required>
            </div>
            <div class="form-group">
              <label>인바디 점수</label>
              <input type="number" id="inbodyScore" required>
            </div>
          </div>

          <div style="text-align: right; margin-top: 20px;">
            <button class="btn btn-primary" id="btnSave" onclick="saveRecord()" style="min-width: 140px;">저장하기</button>
          </div>
        </div>
      </div>

      <div class="chart-card" id="historySection" style="display: none; padding: 24px;">
        <h3 style="font-size: 1.1rem; font-weight: 800; margin-bottom: 16px;">기존 인바디 기록</h3>
        <div style="overflow-x: auto;">
          <table class="record-list-table">
            <thead>
              <tr>
                <th>측정일자</th>
                <th>체중</th>
                <th>골격근량</th>
                <th>체지방률</th>
                <th>점수</th>
                <th>이미지</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="recordListBody">
              <!-- Records injected here -->
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script src="js/supabase-auth.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/admin-inbody.js"></script>
</body>
</html>
