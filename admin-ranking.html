<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 랭킹 — 건강지킴이 Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Admin Login Overlay ── */
    #adminLoginOverlay {
      position: fixed; inset: 0; z-index: 99999;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .admin-login-card {
      background: white; border-radius: var(--radius-xl);
      padding: 40px 36px; width: 100%; max-width: 380px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    }
    .admin-login-logo { text-align: center; margin-bottom: 28px; }
    .admin-login-logo h2 { font-size: 1.2rem; font-weight: 800; color: var(--text); margin-top: 10px; }
    .admin-login-logo p  { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    .admin-err { color: #b91c1c; font-size: 0.82rem; margin-top: 6px; display: none; }
    .admin-err.show { display: block; }

    .admin-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: linear-gradient(135deg, var(--gold), #b8921a);
      color: #fff; font-size: 0.7rem; font-weight: 800;
      padding: 3px 9px; border-radius: 100px;
      letter-spacing: .05em; text-transform: uppercase; margin-left: 6px;
    }

    /* ── Tables ── */
    .rank-table { width:100%; border-collapse:collapse; }
    .rank-table th {
      text-align:left; padding:10px 14px; font-size:.73rem; font-weight:700;
      color:var(--text-secondary); text-transform:uppercase; letter-spacing:.04em;
      border-bottom:2px solid var(--border); background:var(--surface-2);
    }
    .rank-table td {
      padding:11px 14px; font-size:.83rem; color:var(--text);
      border-bottom:1px solid var(--border); vertical-align:middle;
    }
    .rank-table tr:last-child td { border-bottom:none; }
    .rank-table tr:hover td { background:var(--surface-2); }
    .rank-num {
      display:inline-flex; align-items:center; justify-content:center;
      width:26px; height:26px; border-radius:50%; font-size:.78rem; font-weight:800;
      background:var(--surface-2); color:var(--text-secondary);
    }
    .rank-num.gold   { background:rgba(221,202,75,.2);  color:var(--gold-dark); }
    .rank-num.silver { background:rgba(156,163,175,.2); color:#6b7280; }
    .rank-num.bronze { background:rgba(180,83,9,.15);   color:#b45309; }
    .user-avatar-sm {
      width:34px; height:34px; border-radius:50%;
      background:linear-gradient(135deg,var(--primary),var(--primary-light));
      color:white; display:flex; align-items:center; justify-content:center;
      font-size:.85rem; font-weight:700; flex-shrink:0;
    }
    .user-name-cell { display:flex; align-items:center; gap:10px; }
    .rank-tabs { display:flex; gap:6px; flex-wrap:wrap; }
    .rank-tab {
      padding:6px 14px; border:1.5px solid var(--border); border-radius:100px;
      font-size:.78rem; font-weight:600; color:var(--text-secondary);
      background:var(--white); cursor:pointer; transition:all .15s;
    }
    .rank-tab.active { background:var(--primary); border-color:var(--primary); color:white; }
  </style>
</head>
<body>

  <!-- ★ 관리자 로그인 오버레이 -->
  <div id="adminLoginOverlay">
    <div class="admin-login-card">
      <div class="admin-login-logo">
        <div style="background:#fff;border-radius:16px;padding:6px;display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;box-shadow:0 2px 12px rgba(0,0,0,0.10);">
          <img src="images/logo.png" alt="건강지킴이 로고" style="width:68px;height:68px;object-fit:contain;border-radius:10px;" onerror="this.style.display='none'">
        </div>
        <h2>관리자 로그인</h2>
        <p>건강지킴이 관리자 전용 페이지입니다</p>
      </div>
      <form onsubmit="handleAdminLogin(event)">
        <div class="form-group">
          <label class="form-label" for="adminId">관리자 아이디</label>
          <div class="input-icon-wrap">
            <span class="icon">👤</span>
            <input type="text" id="adminId" class="form-control" placeholder="관리자 ID 입력" autocomplete="username" autofocus>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="adminPw">비밀번호</label>
          <div class="input-icon-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="adminPw" class="form-control" placeholder="비밀번호 입력" autocomplete="current-password">
          </div>
        </div>
        <p class="admin-err" id="adminErr">아이디 또는 비밀번호가 올바르지 않습니다.</p>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:16px;">🚀 관리자 로그인</button>
        <p style="text-align:center;margin-top:14px;font-size:0.8rem;color:var(--text-muted);">
          <a href="index.html" style="color:var(--primary);">← 일반 사용자 로그인</a>
        </p>
      </form>
    </div>
  </div>

  <!-- Admin Nav -->
  <nav class="top-nav">
    <a href="admin.html" class="nav-brand">
      <div class="nav-brand-icon" style="background:#fff;border-radius:8px;padding:3px;display:flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;"><img src="images/logo.png" alt="건강지킴이" style="width:32px;height:32px;object-fit:contain;" onerror="this.style.display='none'"></div>
      <span class="nav-brand-name">건강지킴이</span>
      <span class="admin-badge">⚙️ Admin</span>
    </a>
    <ul class="nav-links">
      <li><a href="admin.html">📊 관리 현황</a></li>
      <li><a href="admin-ranking.html" class="active">🏆 사용자 랭킹</a></li>
      <li><a href="admin-users.html">👥 사용자 관리</a></li>
    </ul>
    <div class="nav-right">
      <button class="btn-logout" id="btnFilterSpecial" onclick="toggleSpecialFilter()" style="margin-right:8px; border-color:var(--gold);">⭐ 특별관리 보기 (OFF)</button>
      <div class="nav-user">
        <div class="nav-avatar" id="navAvatar">A</div>
        <span class="nav-username" id="navUsername">관리자</span>
      </div>
      <button class="btn-logout" onclick="adminLogout()">로그아웃</button>
    </div>
  </nav>

  <div class="app-layout">
    <main class="page-content fade-in">
      <div class="page-header" style="margin-bottom:24px;">
        <h1><div class="page-icon">🏆</div> 사용자 랭킹</h1>
        <p class="subtitle">카테고리별 사용자 순위 비교</p>
      </div>
      <div class="chart-card mb-20">
        <div class="chart-card-header" style="flex-wrap:wrap;gap:10px;">
          <div class="chart-card-title">🏆 사용자 랭킹</div>
          <div class="rank-tabs" id="rankTabs"></div>
        </div>
        <div class="chart-card-body" style="padding-top:0;">
          <div style="overflow-x:auto;">
            <table class="rank-table"><thead><tr id="rankHead"></tr></thead><tbody id="rankBody"></tbody></table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
