<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>월별 분석 — 건강지킴이</title>
  <meta name="description" content="월별 운동 기록 달력과 카테고리별 통계를 확인하세요.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Month Navigator ── */
    .month-nav-btn {
      width: 32px; height: 32px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .month-nav-btn:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(0,70,128,0.05);
    }
    .month-nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Calendar ── */
    .cal-hdr-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 4px;
    }
    .cal-hdr {
      text-align: center;
      font-size: 0.73rem;
      font-weight: 700;
      color: var(--text-muted);
      padding: 5px 0;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 1fr;
      gap: 3px;
    }
    .cal-cell {
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      position: relative;
      transition: all 0.15s;
      padding: 4px 2px;
    }
    .cal-cell.cal-has {
      background: rgba(0,70,128,0.07);
      cursor: pointer;
    }
    .cal-cell.cal-has:hover {
      background: rgba(0,70,128,0.14);
      transform: scale(1.05);
    }
    .cal-cell.cal-today { border: 2px solid var(--gold); }
    .cal-cell.cal-future { opacity: 0.3; pointer-events: none; }
    .cal-num {
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1;
    }
    .cal-cond-emoji { font-size: 0.75rem; line-height: 1; }
    .cal-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--primary);
    }
    .cal-legend {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 4px;
      vertical-align: middle;
      margin-right: 3px;
    }
    .cal-legend.cal-has  { background: rgba(0,70,128,0.12); border: 1px solid rgba(0,70,128,0.2); }
    .cal-legend.cal-today { border: 2px solid var(--gold); }

    /* ── Stats Panel ── */
    .stats-panel {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
    }
    .stats-panel-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 12px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-row-label { font-size: 0.82rem; color: var(--text-secondary); }
    .stat-row-val   { font-size: 0.88rem; font-weight: 700; color: var(--text); }
    .stat-row-unit  { font-size: 0.68rem; color: var(--text-muted); font-weight: 400; }

    /* ── Category Cards ── */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .cat-card {
      border-radius: var(--radius-md);
      padding: 14px 10px;
      text-align: center;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .cat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .cat-card .cat-icon  { font-size: 1.4rem; }
    .cat-card .cat-name  { font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); margin: 6px 0; }
    .cat-card .cat-mins  { font-size: 1.4rem; font-weight: 900; line-height: 1; }
    .cat-card .cat-unit  { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Record Day Badge ── */
    .record-day-badge {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    @media (max-width: 900px) {
      .monthly-main-grid { grid-template-columns: 1fr !important; }
      .cat-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .cat-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <!-- Top Nav -->
  <nav class="top-nav">
    <a href="dashboard.html" class="nav-brand">
      <div class="nav-brand-icon" style="background:#fff;border-radius:8px;padding:3px;display:flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;"><img src="images/logo.png" alt="건강지킴이" style="width:32px;height:32px;object-fit:contain;" onerror="this.style.display='none'"></div>
      <span class="nav-brand-name">건강지킴이</span>
    </a>
    <ul class="nav-links">
      <li><a href="dashboard.html"><span class="nav-icon">📊</span> 대시보드</a></li>
      <li><a href="monthly.html"><span class="nav-icon">📆</span> 월별 분석</a></li>
      <li><a href="record.html"><span class="nav-icon">✏️</span> 기록하기</a></li>
      <li><a href="history.html"><span class="nav-icon">📋</span> 기록 목록</a></li>    </ul>
    <div class="nav-right">
      <div class="nav-user">
        <div class="nav-avatar" id="navAvatar">U</div>
        <span class="nav-username" id="navUsername">사용자</span>
      </div>
      <button class="btn-logout" onclick="Auth.logout()">로그아웃</button>
    </div>
  </nav>

  <div class="app-layout">
    <main class="page-content fade-in">

      <!-- Page Header + Month Nav -->
      <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div>
          <h1><div class="page-icon">📆</div> 월별 분석</h1>
          <p class="subtitle">월별 운동 기록과 통계를 한눈에 확인하세요</p>
        </div>
        <div style="display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:8px 14px;box-shadow:var(--shadow-sm);">
          <button class="month-nav-btn" id="prevMonthBtn" onclick="changeMonth(-1)">◀</button>
          <span id="monthLabel" style="font-size:1rem;font-weight:800;color:var(--text);min-width:110px;text-align:center;"></span>
          <button class="month-nav-btn" id="nextMonthBtn" onclick="changeMonth(1)">▶</button>
        </div>
      </div>

      <!-- 달력 + 통계 패널 -->
      <div class="chart-card mb-20">
        <div class="chart-card-body">
          <div class="monthly-main-grid" style="display:grid;grid-template-columns:1fr 240px;gap:20px;align-items:stretch;">
            <!-- 달력 -->
            <div style="display:flex;flex-direction:column;gap:6px;">
              <div class="cal-hdr-row" id="calHdrRow"></div>
              <div class="cal-grid" id="calGrid" style="flex:1;"></div>
              <div style="display:flex;align-items:center;gap:12px;font-size:0.73rem;color:var(--text-muted);padding-top:4px;">
                <span><span class="cal-legend cal-has"></span> 기록 있음</span>
                <span><span class="cal-legend cal-today"></span> 오늘</span>
                <span id="totalDaysLabel" style="margin-left:auto;font-weight:700;color:var(--primary);"></span>
              </div>
            </div>
            <!-- 통계 패널 -->
            <div class="stats-panel">
              <div class="stats-panel-title" id="statsPanelTitle"></div>
              <div id="statsRows"></div>
              <div class="stat-row" style="border-bottom:none;margin-top:4px;">
                <span class="stat-row-label">⭐ 평균 컨디션</span>
                <span class="stat-row-val" id="avgCondEl" style="color:var(--gold-dark);"></span>
              </div>
              <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);text-align:center;">
                <div class="record-day-badge" id="recordDayBadge">0<span style="font-size:0.85rem;font-weight:500;color:var(--text-muted);">일</span></div>
                <div style="font-size:0.73rem;color:var(--text-muted);margin-top:2px;">기록 완료</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 카테고리별 운동 시간 -->
      <div class="chart-card mb-20">
        <div class="chart-card-header">
          <div class="chart-card-title">🏅 카테고리별 운동 시간 <span style="font-size:0.75rem;font-weight:400;color:var(--text-muted);">(개인 운동 기록 기준)</span></div>
        </div>
        <div class="chart-card-body">
          <div class="cat-grid" id="catGrid"></div>
        </div>
      </div>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/monthly.js"></script>
</body>
</html>
