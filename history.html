<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기록 목록 — 건강지킴이</title>
  <meta name="description" content="운동 기록 목록을 확인하고 수정·삭제하세요.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
    }

    .filter-bar label {
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .filter-input {
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .filter-input:focus {
      border-color: var(--primary);
    }

    .record-count-badge {
      margin-left: auto;
      background: rgba(0,70,128,0.1);
      color: var(--primary);
      padding: 5px 12px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .records-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .record-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      transition: all 0.2s;
    }

    .record-card:hover {
      box-shadow: var(--shadow-md);
      border-color: rgba(0,70,128,0.2);
      transform: translateY(-1px);
    }

    .record-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
    }

    .record-card-date-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .date-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      flex-shrink: 0;
      color: white;
    }

    .date-icon .date-month {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1;
    }

    .date-icon .date-day {
      font-size: 1.1rem;
      font-weight: 900;
      line-height: 1;
    }

    .record-card-date-info h4 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .record-card-date-info .day-tag {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .record-card-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-2);
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .metric-chip .chip-icon { font-size: 0.85rem; }
    .metric-chip .chip-val { color: var(--primary); }

    .metric-chip.highlight {
      background: rgba(0,70,128,0.06);
      border-color: rgba(0,70,128,0.15);
    }

    .metric-chip.gold-chip {
      background: rgba(221,202,75,0.1);
      border-color: rgba(221,202,75,0.25);
    }

    .metric-chip.gold-chip .chip-val { color: var(--gold-dark); }

    .record-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .record-condition {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .record-memo {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-style: italic;
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Delete confirm modal */
    .confirm-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .confirm-modal.show {
      display: flex;
    }

    .confirm-box {
      background: white;
      border-radius: var(--radius-xl);
      padding: 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: scaleIn 0.2s ease;
    }

    .confirm-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .confirm-box h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .confirm-box p {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .confirm-actions {
      display: flex;
      gap: 10px;
    }

    @keyframes scaleIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 600px) {
      .filter-bar { flex-direction: column; align-items: stretch; gap: 8px; padding: 12px 14px; }
      .filter-input { width: 100%; }
      .record-count-badge { margin-left: 0; text-align: center; }
      .record-card { padding: 14px 14px; }
      .record-card-top { flex-wrap: wrap; }
      .record-memo { max-width: 100%; white-space: normal; }
      .record-footer { flex-direction: column; gap: 8px; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <!-- Top Nav -->
  <nav class="top-nav">
    <a href="dashboard.html" class="nav-brand">
      <div class="nav-brand-icon" style="background:#fff;border-radius:8px;padding:3px;display:flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;"><img src="images/logo.png" alt="건강지킴이" style="width:32px;height:32px;object-fit:contain;" onerror="this.style.display='none'"></div>
      <span class="nav-brand-name">건강지킴이</span>
    </a>
    <ul class="nav-links">
      <li><a href="dashboard.html"><span class="nav-icon">📊</span> 대시보드</a></li>
      <li><a href="monthly.html"><span class="nav-icon">📆</span> 월별 분석</a></li>
      <li><a href="record.html"><span class="nav-icon">✏️</span> 기록하기</a></li>
      <li><a href="history.html"><span class="nav-icon">📋</span> 기록 목록</a></li>
      <li><a href="inbody.html"><span class="nav-icon">💪</span> 인바디(BWA)</a></li>
    </ul>
    <div class="nav-right">
      <div class="nav-user">
        <div class="nav-avatar" id="navAvatar">U</div>
        <span class="nav-username" id="navUsername">사용자</span>
      </div>
      <button class="btn-logout" style="color:#fca5a5; border-color:rgba(252,165,165,0.4);" onclick="Auth.deleteAccount()">계정 탈퇴</button>
      <button class="btn-logout" onclick="Auth.logout()">로그아웃</button>
    </div>
  </nav>

  <div class="app-layout">
    <main class="page-content fade-in">

      <!-- Page Header -->
      <div class="page-header flex justify-between items-center" style="flex-wrap:wrap; gap:12px;">
        <div>
          <h1><div class="page-icon">📋</div> 기록 목록</h1>
          <p class="subtitle">전체 운동 기록을 확인하고 관리하세요</p>
        </div>
        <a href="record.html" class="btn btn-primary">
          ✏️ 새 기록 작성
        </a>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <label for="filterMonth">📅 월별 필터:</label>
        <input type="month" id="filterMonth" class="filter-input" onchange="renderHistory()">
        <label for="filterSort" style="margin-left:8px;">정렬:</label>
        <select id="filterSort" class="filter-input" onchange="renderHistory()">
          <option value="desc">최신순</option>
          <option value="asc">오래된순</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="clearFilter()">초기화</button>
        <div class="record-count-badge" id="recordCountBadge">전체 0개</div>
      </div>

      <!-- Records List -->
      <div id="recordsList" class="records-list"></div>

    </main>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="confirm-modal" id="confirmModal">
    <div class="confirm-box">
      <div class="confirm-icon">🗑️</div>
      <h3>기록을 삭제할까요?</h3>
      <p>삭제된 기록은 복구할 수 없습니다.</p>
      <div class="confirm-actions">
        <button class="btn btn-outline btn-block" onclick="closeConfirm()">취소</button>
        <button class="btn btn-danger btn-block" id="confirmDeleteBtn" onclick="confirmDelete()">삭제하기</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
