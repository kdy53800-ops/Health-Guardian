<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인바디(BWA) — 건강지킴이</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .inbody-charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 20px;
    }
    
    .chart-card h3 {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .record-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .record-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      transition: all 0.2s;
    }
    
    .record-item:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-sm);
      transform: translateY(-2px);
    }
    
    .record-date-badge {
      background: var(--primary);
      color: white;
      font-weight: 800;
      font-size: 0.85rem;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      text-align: center;
      min-width: 90px;
    }
    
    .record-details {
      display: flex;
      gap: 20px;
      flex: 1;
      flex-wrap: wrap;
    }
    
    .detail-stat {
      display: flex;
      flex-direction: column;
    }
    
    .detail-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    
    .detail-val {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--text);
    }
    
    .btn-view-image {
      background: rgba(0,70,128,0.1);
      color: var(--primary);
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .btn-view-image:hover {
      background: var(--primary);
      color: white;
    }
    
    /* Image Modal */
    #imageModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    #imageModal.show {
      display: flex;
    }
    
    #imageModal img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: var(--radius-md);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    
    .close-modal {
      position: absolute;
      top: 20px;
      right: 20px;
      background: white;
      color: black;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 800;
      cursor: pointer;
      border: none;
    }

    .no-data {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      background: var(--surface-2);
      border-radius: var(--radius-lg);
      border: 1px dashed var(--border);
    }

    @media (max-width: 900px) {
      .inbody-charts-grid { grid-template-columns: 1fr; }
      .record-item { flex-direction: column; align-items: flex-start; }
      .btn-view-image { align-self: flex-end; }
    }
  </style>
</head>
<body>
  <!-- Top Nav -->
  <nav class="top-nav">
    <a href="dashboard.html" class="nav-brand">
      <div class="nav-brand-icon" style="background:#fff;border-radius:8px;padding:3px;display:flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;"><img src="images/logo.png" alt="건강지킴이" style="width:32px;height:32px;object-fit:contain;" onerror="this.style.display='none'"></div>
      <span class="nav-brand-name">건강지킴이</span>
    </a>
    <ul class="nav-links">
      <li><a href="dashboard.html"><span class="nav-icon">📊</span> 대시보드</a></li>
      <li><a href="monthly.html"><span class="nav-icon">📆</span> 월별 분석</a></li>
      <li><a href="record.html"><span class="nav-icon">✏️</span> 기록하기</a></li>
      <li><a href="history.html"><span class="nav-icon">📋</span> 기록 목록</a></li>
      <li><a href="inbody.html" class="active"><span class="nav-icon">💪</span> 인바디(BWA)</a></li>
    </ul>
    <div class="nav-right">
      <div class="nav-user">
        <div class="nav-avatar" id="navAvatar">U</div>
        <span class="nav-username" id="navUsername">사용자</span>
      </div>
      <button class="btn-logout" onclick="Auth.logout()">로그아웃</button>
    </div>
  </nav>

  <div class="app-layout">
    <main class="page-content fade-in" id="mainContent">
      <div class="page-header" style="margin-bottom:24px;">
        <h1><div class="page-icon">💪</div> 인바디(BWA) 분석</h1>
        <p class="subtitle">체성분 변화 추이와 인바디 검사 결과를 확인하세요.</p>
      </div>

      <div id="noDataMessage" class="no-data" style="display: none;">
        <div style="font-size: 3rem; margin-bottom: 10px;">📉</div>
        <h3>아직 등록된 인바디 기록이 없습니다</h3>
        <p>관리자가 인바디 결과를 업로드하면 이곳에서 확인하실 수 있습니다.</p>
      </div>

      <div id="inbodyContent" style="display: none;">
        <div class="inbody-charts-grid">
          <!-- 체성분 비교 차트 (최근 기록 기준) -->
          <div class="chart-card">
            <h3>📊 체성분 구성 (최근 기록)</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px;">체중, 골격근량, 체지방량 비교를 통한 C, I, D 형태 분석</p>
            <div style="height: 250px;"><canvas id="chartComposition"></canvas></div>
          </div>

          <!-- 주요 지표 변화 추이 차트 -->
          <div class="chart-card">
            <h3>📈 주요 지표 변화 추이</h3>
            <div style="height: 250px;"><canvas id="chartTrends"></canvas></div>
          </div>
          
          <!-- 체지방률 & 세포외수분비 추이 차트 -->
          <div class="chart-card">
            <h3>💧 체지방률 및 세포외수분비 추이</h3>
            <div style="height: 250px;"><canvas id="chartRatio"></canvas></div>
          </div>
          
          <!-- 인바디 점수 추이 -->
          <div class="chart-card">
            <h3>⭐ 인바디 점수 추이</h3>
            <div style="height: 250px;"><canvas id="chartScore"></canvas></div>
          </div>
        </div>

        <div class="chart-card">
          <h3>📋 나의 인바디 기록</h3>
          <div class="record-list" id="recordList">
            <!-- Records injected here -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="imageModal" onclick="closeImageModal()">
    <button class="close-modal" onclick="closeImageModal()">✕</button>
    <img id="modalImg" src="" alt="인바디 결과지" onclick="event.stopPropagation()">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/inbody.js"></script>
</body>
</html>
