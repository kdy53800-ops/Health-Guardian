<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 관리 — 건강지킴이 Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Admin Login Overlay ── */
    #adminLoginOverlay {
      position: fixed; inset: 0; z-index: 99999;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: none; align-items: center; justify-content: center;
    }
    .admin-login-card {
      background: white; border-radius: var(--radius-xl);
      padding: 40px 36px; width: 100%; max-width: 380px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    }
    .admin-login-logo { text-align: center; margin-bottom: 28px; }
    .admin-login-logo h2 { font-size: 1.2rem; font-weight: 800; color: var(--text); margin-top: 10px; }
    .admin-login-logo p  { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    .admin-err { color: #b91c1c; font-size: 0.82rem; margin-top: 6px; display: none; }
    .admin-err.show { display: block; }

    .admin-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: linear-gradient(135deg, var(--gold), #b8921a);
      color: #fff; font-size: 0.7rem; font-weight: 800;
      padding: 3px 9px; border-radius: 100px;
      letter-spacing: .05em; text-transform: uppercase; margin-left: 6px;
    }

    /* ── Tables ── */
    .mgmt-table { width:100%; border-collapse:collapse; }
    .mgmt-table th {
      text-align:left; padding:10px 14px; font-size:.73rem; font-weight:700;
      color:var(--text-secondary); text-transform:uppercase; letter-spacing:.04em;
      border-bottom:2px solid var(--border); background:var(--surface-2);
    }
    .mgmt-table td {
      padding:11px 14px; font-size:.83rem; color:var(--text);
      border-bottom:1px solid var(--border); vertical-align:middle;
    }
    .mgmt-table tr:last-child td { border-bottom:none; }
    .mgmt-table tr:hover td { background:var(--surface-2); }

    /* 테이블 모바일 스크롤 */
    .table-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }
    .table-scroll-wrap .mgmt-table { min-width: 700px; }

    @media (max-width: 600px) {
      .platform-stats { grid-template-columns: repeat(2,1fr) !important; }
      .admin-charts { grid-template-columns: 1fr !important; }
    }

    .user-avatar-sm {
      width:34px; height:34px; border-radius:50%;
      background:linear-gradient(135deg,var(--primary),var(--primary-light));
      color:white; display:flex; align-items:center; justify-content:center;
      font-size:.85rem; font-weight:700; flex-shrink:0;
    }
    .user-name-cell { display:flex; align-items:center; gap:10px; }
    .badge-active {
      display:inline-block; background:rgba(34,197,94,.12); color:#16a34a;
      font-size:.7rem; font-weight:700; padding:2px 8px; border-radius:100px;
      border:1px solid rgba(34,197,94,.25);
    }
    .badge-inactive {
      display:inline-block; background:rgba(107,114,128,.1); color:var(--text-muted);
      font-size:.7rem; font-weight:700; padding:2px 8px; border-radius:100px;
    }

    /* ── Confirm Modal ── */
    .confirm-modal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
      z-index:9999; align-items:center; justify-content:center; padding:20px;
    }
    .confirm-modal.show { display:flex; }
    .confirm-box {
      background:white; border-radius:var(--radius-xl); padding:32px;
      text-align:center; max-width:360px; width:100%;
      box-shadow:0 20px 60px rgba(0,0,0,.2); animation:scaleIn .2s ease;
    }
    @keyframes scaleIn { from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }
  </style>
</head>
<body>

  <!-- ★ 관리자 로그인 오버레이 -->
  <div id="adminLoginOverlay">
    <div class="admin-login-card">
      <div class="admin-login-logo">
        <div style="background:#fff;border-radius:16px;padding:6px;display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;box-shadow:0 2px 12px rgba(0,0,0,0.10);">
          <img src="images/logo.png" alt="건강지킴이 로고" style="width:68px;height:68px;object-fit:contain;border-radius:10px;" onerror="this.style.display='none'">
        </div>
        <h2>관리자 로그인</h2>
        <p>건강지킴이 관리자 전용 페이지입니다</p>
      </div>
      <div style="margin-top: 24px;">
        <button type="button" class="btn btn-block btn-lg" style="background:#03C75A; color:white; font-weight:700; border:none; display:flex; align-items:center; justify-content:center; gap:8px;" onclick="window.location.href='api/naver-login?redirect_to=' + encodeURIComponent(window.location.pathname)">
          네이버 아이디로 관리자 로그인
        </button>
        <p class="admin-err" id="adminErr" style="text-align:center; margin-top:12px;"></p>
        <p style="text-align:center;margin-top:16px;font-size:0.8rem;color:var(--text-muted);">
          <a href="index.html" style="color:var(--text-muted);text-decoration:underline;">← 일반 사용자 로그인 홈으로</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Admin Nav -->
  <nav class="top-nav">
    <a href="admin.html" class="nav-brand">
      <div class="nav-brand-icon" style="background:#fff;border-radius:8px;padding:3px;display:flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;"><img src="images/logo.png" alt="건강지킴이" style="width:32px;height:32px;object-fit:contain;" onerror="this.style.display='none'"></div>
      <span class="nav-brand-name">건강지킴이</span>
      <span class="admin-badge">⚙️ Admin</span>
    </a>
    <ul class="nav-links">
      <li><a href="admin.html">📊 관리 현황</a></li>
      <li><a href="admin-ranking.html">🏆 사용자 랭킹</a></li>
      <li><a href="admin-users.html" class="active">👥 사용자 관리</a></li>
      <li><a href="admin-inbody.html">💪 인바디 관리</a></li>
    </ul>
    <div class="nav-right">
      <a href="dashboard.html" class="btn btn-gold btn-sm" style="margin-right:8px; text-decoration:none;">🏠 개인 대시보드</a>
      <div class="nav-user">
        <div class="nav-avatar" id="navAvatar">A</div>
        <span class="nav-username" id="navUsername">관리자</span>
      </div>
      <button class="btn-logout" onclick="adminLogout()">로그아웃</button>
    </div>
  </nav>

  <div class="app-layout">
    <main class="page-content fade-in">
      <div class="page-header" style="margin-bottom:24px;">
        <h1><div class="page-icon">👥</div> 사용자 관리</h1>
        <p class="subtitle">가입 사용자 조회, 상세 통계 확인 및 관리</p>
      </div>

      <!-- ── ADMIN FILTER BAR ── -->
      <div class="admin-filter-bar" style="display:flex; gap:16px; align-items:center; padding:16px; background:var(--surface-2); border-radius:var(--radius-md); margin-bottom:20px;">
        <div class="filter-group">
          <span class="filter-label" style="font-size:0.8rem; font-weight:700; margin-right:8px;">🚻 성별</span>
          <select id="filterGender" class="filter-select" onchange="updateFilters()">
            <option value="all">전체</option>
            <option value="남">남성</option>
            <option value="여">여성</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label" style="font-size:0.8rem; font-weight:700; margin-right:8px;">🎂 연령대</span>
          <select id="filterAge" class="filter-select" onchange="updateFilters()">
            <option value="all">전체</option>
            <option value="20">20대</option>
            <option value="30">30대</option>
            <option value="40">40대</option>
            <option value="50">50대 이상</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label">⭐ 대상</span>
          <select id="filterSpecial" class="filter-select" onchange="updateFilters()" style="border-color:var(--gold);">
            <option value="all">전체 사용자</option>
            <option value="special">특별관리 대상</option>
          </select>
        </div>
      </div>

      <div class="chart-card mb-20">
        <div class="chart-card-header">
          <div class="chart-card-title">👥 사용자 목록</div>
          <input type="text" id="userSearch" placeholder="이름/이메일 검색…"
            style="border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;font-size:.83rem;font-family:inherit;outline:none;width:180px;"
            oninput="renderUserMgmt()">
        </div>
        <div class="chart-card-body" style="padding-top:0;">
          <div class="table-scroll-wrap">
            <table class="mgmt-table">
              <thead><tr>
                <th>사용자</th><th>이메일</th><th>전화번호</th><th>가입일</th>
                <th>총 기록</th><th>최근 기록</th><th>스트릭</th><th>상태</th><th>관리</th>
              </tr></thead>
              <tbody id="mgmtBody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- 삭제 확인 모달 -->
  <div class="confirm-modal" id="confirmModal">
    <div class="confirm-box">
      <div style="font-size:3rem;margin-bottom:12px;">⚠️</div>
      <h3 style="font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:8px;">사용자를 삭제할까요?</h3>
      <p id="confirmMsg" style="font-size:.85rem;color:var(--text-secondary);margin-bottom:24px;"></p>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-outline btn-block" onclick="closeConfirm()">취소</button>
        <button class="btn btn-danger btn-block" id="confirmDeleteBtn">삭제하기</button>
      </div>
    </div>
  </div>

  <!-- 사용자 상세 모달 -->
  <div id="userDetailModal" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.55);overflow-y:auto;padding:30px 16px;">
    <div style="background:white;border-radius:var(--radius-xl);max-width:720px;width:100%;margin:0 auto;
                box-shadow:0 24px 80px rgba(0,0,0,0.25);overflow:hidden;">
      <!-- 모달 헤더 -->
      <div id="udHeader" style="background:linear-gradient(135deg,var(--primary-dark),var(--primary));padding:28px 28px 20px;color:white;display:flex;align-items:center;gap:18px;">
        <div id="udAvatar" style="width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;flex-shrink:0;"></div>
        <div style="flex:1;min-width:0;">
          <div id="udName" style="font-size:1.25rem;font-weight:800;"></div>
          <div id="udMeta" style="font-size:0.82rem;opacity:0.8;margin-top:3px;"></div>
        </div>
        <button onclick="closeUserDetail()" style="background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:1.1rem;cursor:pointer;flex-shrink:0;">✕</button>
      </div>
      <!-- 통계 카드 4개 -->
      <div id="udStats" style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:1px solid var(--border);"></div>
      <!-- 탭 -->
      <div style="display:flex;border-bottom:2px solid var(--border);padding:0 24px;background:var(--surface);">
        <button class="ud-tab active" id="udTab0" onclick="switchUdTab(0)" style="padding:12px 18px;border:none;background:none;font-size:0.85rem;font-weight:700;color:var(--primary);border-bottom:2px solid var(--primary);margin-bottom:-2px;cursor:pointer;">📋 기록 목록</button>
        <button class="ud-tab" id="udTab1" onclick="switchUdTab(1)" style="padding:12px 18px;border:none;background:none;font-size:0.85rem;font-weight:600;color:var(--text-secondary);cursor:pointer;">📊 운동 통계</button>
        <button class="ud-tab" id="udTab2" onclick="switchUdTab(2)" style="padding:12px 18px;border:none;background:none;font-size:0.85rem;font-weight:600;color:var(--text-secondary);cursor:pointer;">🏋️ 카테고리</button>
      </div>
      <!-- 탭 패널 0: 기록 목록 -->
      <div id="udPanel0" style="padding:20px 24px;max-height:400px;overflow-y:auto;">
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr>
            <th style="text-align:left;padding:8px 10px;font-size:0.73rem;font-weight:700;color:var(--text-secondary);border-bottom:2px solid var(--border);text-transform:uppercase;">날짜</th>
            <th style="text-align:center;padding:8px 10px;font-size:0.73rem;font-weight:700;color:var(--text-secondary);border-bottom:2px solid var(--border);text-transform:uppercase;">걷기</th>
            <th style="text-align:center;padding:8px 10px;font-size:0.73rem;font-weight:700;color:var(--text-secondary);border-bottom:2px solid var(--border);text-transform:uppercase;">러닝</th>
            <th style="text-align:center;padding:8px 10px;font-size:0.73rem;font-weight:700;color:var(--text-secondary);border-bottom:2px solid var(--border);text-transform:uppercase;">스쿼트</th>
            <th style="text-align:center;padding:8px 10px;font-size:0.73rem;font-weight:700;color:var(--text-secondary);border-bottom:2px solid var(--border);text-transform:uppercase;">수분</th>
            <th style="text-align:center;padding:8px 10px;font-size:0.73rem;font-weight:700;color:var(--text-secondary);border-bottom:2px solid var(--border);text-transform:uppercase;">컨디션</th>
          </tr></thead>
          <tbody id="udRecordBody"></tbody>
        </table>
      </div>
      <!-- 탭 패널 1: 운동 통계 차트 -->
      <div id="udPanel1" style="display:none;padding:20px 24px;">
        <div style="height:220px;"><canvas id="udChartActivity"></canvas></div>
      </div>
      <!-- 탭 패널 2: 카테고리 분포 -->
      <div id="udPanel2" style="display:none;padding:20px 24px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:center;">
          <div style="height:200px;"><canvas id="udChartCat"></canvas></div>
          <div id="udCatList"></div>
        </div>
      </div>
      <!-- 모달 푸터 -->
      <div style="padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface);">
        <button class="btn btn-outline" onclick="closeUserDetail()">닫기</button>
        <button class="btn btn-sm" id="udDeleteBtn" style="background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5;font-size:0.82rem;padding:8px 16px;">
          🗑️ 사용자 삭제
        </button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/supabase-auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
