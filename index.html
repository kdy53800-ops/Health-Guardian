<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>건강지킴이 | 건강한 변화의 시작</title>
  <meta name="description" content="나만을 위한 스마트한 건강 기록 서비스, 건강지킴이. 네이버 로그인으로 간편하게 시작하세요.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-green: #03c75a;
      --glass-white: rgba(255, 255, 255, 0.85);
      --text-dark: #1e293b;
      --text-gray: #64748b;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', 'Inter', sans-serif;
      overflow-x: hidden;
      background: #f8fafc;
    }

    .login-container {
      position: relative;
      width: 100vw;
      min-height: 100dvh;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    /* 밝은 배경 이미지 및 오버레이 */
    .bg-image {
      position: absolute;
      inset: 0;
      background: url('health_guardian_bright_hero_1776476490660.png') no-repeat center center;
      background-size: cover;
      filter: brightness(1.05) saturate(1.1);
      z-index: 1;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(240, 249, 255, 0.6) 100%);
      z-index: 2;
    }

    /* 메인 콘텐츠 카드 (더 밝고 깨끗한 글래스모피즘) */
    .login-card {
      position: relative;
      z-index: 10;
      width: calc(100% - 40px);
      max-width: 440px;
      padding: 48px 40px;
      background: var(--glass-white);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 40px;
      box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.1);
      text-align: center;
      animation: fadeInZoom 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes fadeInZoom {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .logo-area {
      margin-bottom: 35px;
    }

    .logo-img {
      width: 85px;
      height: 85px;
      background: white;
      padding: 12px;
      border-radius: 26px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
      margin-bottom: 24px;
      display: inline-block;
    }

    .brand-name {
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--text-dark);
      margin: 0;
      letter-spacing: -0.03em;
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--text-gray);
      margin-top: 12px;
      line-height: 1.6;
      font-weight: 500;
    }

    /* 네이버 로그인 버튼 (더 밝은 색상) */
    .btn-naver {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      height: 62px;
      background: #03c75a;
      color: white;
      text-decoration: none;
      border-radius: 18px;
      font-size: 1.15rem;
      font-weight: 700;
      margin: 45px 0 25px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(3, 199, 90, 0.25);
    }

    .btn-naver:hover {
      background: #02b350;
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(3, 199, 90, 0.35);
    }

    .btn-naver img {
      width: 24px;
      height: 24px;
    }

    .login-footer {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-top: 20px;
      font-weight: 500;
    }

    .admin-link {
      margin-top: 35px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #94a3b8;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .admin-link:hover {
      color: var(--text-gray);
      text-decoration: underline;
    }

    /* 플로팅 뱃지 (파스텔 톤) */
    .badge-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 25px;
    }

    .badge {
      font-size: 0.78rem;
      padding: 7px 14px;
      background: #f1f5f9;
      border-radius: 100px;
      color: #64748b;
      font-weight: 600;
      border: 1px solid #e2e8f0;
    }

    /* 모바일 대응 */
    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px;
        border-radius: 28px;
      }
      .brand-name { font-size: 1.9rem; }
      .tagline { font-size: 0.92rem; }
      .logo-img { width: 68px; height: 68px; margin-bottom: 16px; }
      .btn-naver { height: 56px; font-size: 1rem; margin: 32px 0 20px; }
      .badge-group { gap: 6px; }
      .badge { font-size: 0.72rem; padding: 6px 10px; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="login-card">
      <div class="logo-area">
        <div class="logo-img">
          <img src="images/logo.png" alt="건강지킴이 로고" style="width: 100%; height: 100%; object-fit: contain;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2966/2966486.png'">
        </div>
        <h1 class="brand-name">건강지킴이</h1>
        <p class="tagline">당신의 활기찬 일상을 위한<br>스마트한 건강 파트너</p>
      </div>

      <div class="badge-group">
        <span class="badge">운동 추적</span>
        <span class="badge">체성분 분석</span>
        <span class="badge">생활 기록</span>
      </div>

      <a href="#" class="btn-naver" onclick="handleNaverLogin(event); return false;">
        네이버로 간편 시작
      </a>

      <div class="login-footer">
        가입 절차 없이 안전하게 시작하세요.
      </div>

      <a href="admin.html" class="admin-link">
        <i class="fas fa-user-shield"></i> 관리자 페이지
      </a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/supabase-auth.js"></script>
  <script>
    (async function () {
      await SupabaseAuth.handleIndexSession();
      const user = Auth.getUser();
      if (user) {
        window.location.href = 'dashboard.html';
      }
    })();

    async function handleNaverLogin(event) {
      if (event) event.preventDefault();
      try {
        await SupabaseAuth.signInWithNaver();
      } catch (error) {
        console.error(error);
        alert('네이버 로그인 연결에 실패했습니다.\n잠시 후 다시 시도해 주세요.');
      }
    }
  </script>
</body>
</html>
