<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>건강지킴이 | 건강한 변화의 시작</title>
  <meta name="description" content="나만을 위한 스마트한 건강 기록 서비스, 건강지킴이. 네이버 로그인으로 간편하게 시작하세요.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #03c75a 0%, #02a14a 100%);
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.4);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', 'Inter', sans-serif;
      overflow: hidden;
      background: #000;
    }

    .login-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 배경 이미지 및 오버레이 */
    .bg-image {
      position: absolute;
      inset: 0;
      background: url('health_guardian_hero_bg_1776476357110.png') no-repeat center center;
      background-size: cover;
      filter: brightness(0.65) saturate(1.1);
      z-index: 1;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
      z-index: 2;
    }

    /* 메인 콘텐츠 카드 */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 50px 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      margin-bottom: 30px;
    }

    .logo-img {
      width: 90px;
      height: 90px;
      background: white;
      padding: 10px;
      border-radius: 24px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      display: inline-block;
      animation: pulse 3s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .brand-name {
      font-size: 2.2rem;
      font-weight: 900;
      color: #1e293b;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .tagline {
      font-size: 1rem;
      color: #64748b;
      margin-top: 10px;
      line-height: 1.6;
      font-weight: 500;
    }

    /* 네이버 로그인 버튼 */
    .btn-naver {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      height: 60px;
      background: #03c75a;
      color: white;
      text-decoration: none;
      border-radius: 18px;
      font-size: 1.1rem;
      font-weight: 700;
      margin: 40px 0 20px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px rgba(3, 199, 90, 0.3);
    }

    .btn-naver:hover {
      background: #02b350;
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(3, 199, 90, 0.4);
    }

    .btn-naver img {
      width: 24px;
      height: 24px;
    }

    .login-footer {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 20px;
    }

    .admin-link {
      margin-top: 30px;
      display: inline-block;
      font-size: 0.8rem;
      color: #64748b;
      text-decoration: none;
      font-weight: 600;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .admin-link:hover {
      opacity: 1;
      text-decoration: underline;
    }

    /* 플로팅 뱃지 */
    .badge-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .badge {
      font-size: 0.75rem;
      padding: 6px 12px;
      background: rgba(0,0,0,0.05);
      border-radius: 100px;
      color: #64748b;
      font-weight: 600;
    }

    /* 모바일 대응 */
    @media (max-width: 480px) {
      .login-card {
        margin: 0 20px;
        padding: 40px 25px;
      }
      .brand-name { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="login-card">
      <div class="logo-area">
        <div class="logo-img">
          <img src="images/logo.png" alt="건강지킴이 로고" style="width: 100%; height: 100%; object-fit: contain;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2966/2966486.png'">
        </div>
        <h1 class="brand-name">건강지킴이</h1>
        <p class="tagline">나를 위한 스마트한 변화,<br>건강지킴이와 함께 오늘부터 시작하세요.</p>
      </div>

      <div class="badge-group">
        <span class="badge">#운동기록</span>
        <span class="badge">#체중관리</span>
        <span class="badge">#인바디분석</span>
      </div>

      <a href="#" class="btn-naver" onclick="handleNaverLogin(event); return false;">
        <img src="https://clova-phinf.pstatic.net/Organization/1/common/naver_login_icon.png" alt="네이버 로고">
        네이버로 시작하기
      </a>

      <div class="login-footer">
        네이버 아이디 하나로 간편하게 가입 없이 이용하세요.
      </div>

      <a href="admin.html" class="admin-link">
        <i class="fas fa-lock"></i> 관리자 페이지
      </a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/supabase-auth.js"></script>
  <script>
    (async function () {
      await SupabaseAuth.handleIndexSession();
      const user = Auth.getUser();
      if (user) window.location.href = 'dashboard.html';
    })();

    async function handleNaverLogin(event) {
      if (event) event.preventDefault();
      try {
        await SupabaseAuth.signInWithNaver();
      } catch (error) {
        console.error(error);
        alert('네이버 로그인 연결에 실패했습니다.\n잠시 후 다시 시도해 주세요.');
      }
    }
  </script>
</body>
</html>
