<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인바디 랭킹 — 건강지킴이 Admin</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Admin Login Overlay ── */
    #adminLoginOverlay {
      position: fixed; inset: 0; z-index: 99999;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: none; align-items: center; justify-content: center;
    }
    .admin-login-card {
      background: white; border-radius: var(--radius-xl);
      padding: 40px 36px; width: 100%; max-width: 380px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    }
    .admin-login-logo { text-align: center; margin-bottom: 28px; }
    .admin-login-logo h2 { font-size: 1.2rem; font-weight: 800; color: var(--text); margin-top: 10px; }
    .admin-login-logo p  { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    .admin-err { color: #b91c1c; font-size: 0.82rem; margin-top: 6px; display: none; }
    .admin-err.show { display: block; }

    .admin-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: linear-gradient(135deg, var(--gold), #b8921a);
      color: #fff; font-size: 0.7rem; font-weight: 800;
      padding: 3px 9px; border-radius: 100px;
      letter-spacing: .05em; text-transform: uppercase; margin-left: 6px;
    }

    /* ── Rank Tabs ── */
    .rank-tabs {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .rank-tab {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; padding: 10px 20px; font-size: 0.9rem; font-weight: 700;
      color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
    }
    .rank-tab:hover { background: rgba(0,70,128,0.05); }
    .rank-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 12px rgba(0,70,128,0.3); }

    /* ── Rank Board ── */
    .rank-board {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .rank-table { width: 100%; border-collapse: collapse; }
    .rank-table th {
      text-align: left; padding: 12px 10px; font-size: 0.8rem; color: var(--text-secondary); border-bottom: 2px solid var(--border);
    }
    .rank-table td {
      padding: 14px 10px; font-size: 0.9rem; border-bottom: 1px solid var(--border); vertical-align: middle;
    }
    
    /* 테이블 모바일 스크롤 */
    .table-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
    }
    .table-scroll-wrap .rank-table { min-width: 620px; }
    .r-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 50%; font-size: 0.8rem; font-weight: 800; color: #fff;
    }
    .r-badge.r1 { background: linear-gradient(135deg, #fbbf24, #d97706); width: 30px; height: 30px; font-size: 1rem; }
    .r-badge.r2 { background: linear-gradient(135deg, #94a3b8, #475569); width: 28px; height: 28px; font-size: 0.9rem; }
    .r-badge.r3 { background: linear-gradient(135deg, #b45309, #78350f); width: 26px; height: 26px; font-size: 0.85rem; }
    .r-badge.other { background: #e2e8f0; color: #475569; }
    
    .u-info { display: flex; align-items: center; gap: 12px; }
    .u-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--primary-light);
      color: var(--primary); display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.9rem;
    }
    .u-name { font-weight: 700; color: var(--text); }
    .u-special { font-size: 0.7rem; background: var(--gold); color: #fff; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
    .u-val { font-size: 1.1rem; font-weight: 900; color: var(--primary); }
  </style>
</head>
<body>

  <!-- 관리자 로그인 오버레이 -->
  <div id="adminLoginOverlay">
    <div class="admin-login-card">
      <div class="admin-login-logo">
        <div style="background:#fff;border-radius:16px;padding:6px;display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;box-shadow:0 2px 12px rgba(0,0,0,0.10);">
          <img src="images/logo.png" alt="건강지킴이 로고" style="width:68px;height:68px;object-fit:contain;border-radius:10px;" onerror="this.style.display='none'">
        </div>
        <h2>관리자 로그인</h2>
        <p>건강지킴이 관리자 전용 페이지입니다</p>
      </div>
      <div style="margin-top: 24px;">
        <button type="button" class="btn btn-block btn-lg" style="background:#03C75A; color:white; font-weight:700; border:none; display:flex; align-items:center; justify-content:center; gap:8px;" onclick="window.location.href='api/naver-login?redirect_to=' + encodeURIComponent(window.location.pathname)">
          네이버 아이디로 관리자 로그인
        </button>
        <p class="admin-err" id="adminErr" style="text-align:center; margin-top:12px;"></p>
        <p style="text-align:center;margin-top:16px;font-size:0.8rem;color:var(--text-muted);">
          <a href="index.html" style="color:var(--text-muted);text-decoration:underline;">← 일반 사용자 로그인 홈으로</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Admin Nav -->
  <nav class="top-nav">
    <a href="admin.html" class="nav-brand">
      <div class="nav-brand-icon" style="background:#fff;border-radius:8px;padding:3px;display:flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;"><img src="images/logo.png" alt="건강지킴이" style="width:32px;height:32px;object-fit:contain;" onerror="this.style.display='none'"></div>
      <span class="nav-brand-name">건강지킴이</span>
      <span class="admin-badge">⚙️ Admin</span>
    </a>
    <ul class="nav-links">
      <li><a href="admin.html">🏃 일반 지표</a></li>
      <li><a href="admin-inbody.html" class="active">💪 체성분 관리</a></li>
      <li><a href="admin-users.html">👥 사용자 관리</a></li>
    </ul>
    <div class="nav-right">
      <a href="dashboard.html" class="btn btn-gold btn-sm" style="margin-right:8px; text-decoration:none;">🏠 개인 대시보드</a>
      <div class="nav-user">
        <div class="nav-avatar" id="navAvatar">A</div>
        <span class="nav-username" id="navUsername">관리자</span>
      </div>
      <button class="btn-logout" onclick="adminLogout()">로그아웃</button>
    </div>
  </nav>

  <div class="app-layout">
    <main class="page-content fade-in">
      <div class="sub-nav-tabs">
        <a href="admin-inbody.html">🛠️ 기록 관리 (업로드)</a>
        <a href="admin-inbody-ranking.html" class="active">🏆 인바디 랭킹</a>
        <a href="admin-inbody-growth.html">📈 인바디 개선도</a>
      </div>

      <div class="page-header" style="margin-bottom:24px;">
        <h1><div class="page-icon">🏆</div> 인바디 랭킹</h1>
        <p class="subtitle">특별관리 대상자의 최신 체성분 지표 순위</p>
      </div>
      
      <!-- ── ADMIN FILTER BAR ── -->
      <div class="admin-filter-bar" style="flex-wrap: wrap; gap: 16px;">
        <div class="filter-group">
          <span class="filter-label">🔍 대상자 검색</span>
          <input type="text" id="userSearchInput" class="filter-select" placeholder="이름 또는 아이디 검색" onkeyup="filterInBodyTable()">
        </div>
      </div>

      <div class="chart-card mb-20">
        <div class="chart-card-header" style="flex-wrap:wrap;gap:10px;">
          <div class="chart-card-title">🏆 인바디 랭킹 카테고리</div>
          <div class="rank-tabs" id="rankTabs">
            <button class="rank-tab active" onclick="changeRankMode('score')">인바디 점수</button>
            <button class="rank-tab" onclick="changeRankMode('muscle')">골격근량 (높은순)</button>
            <button class="rank-tab" onclick="changeRankMode('fat')">체지방률 (낮은순)</button>
          </div>
        </div>
        <div class="chart-card-body" style="padding-top:0;">
          <div class="table-scroll-wrap">
            <table class="rank-table">
              <thead>
                <tr>
                  <th style="width:60px;">순위</th>
                  <th>대상자</th>
                  <th id="rankValueHead">측정 수치</th>
                  <th>측정일자</th>
                  <th>체중</th>
                </tr>
              </thead>
              <tbody id="rankBody">
                <tr><td colspan="5" style="text-align:center; padding:30px; color:var(--text-muted);">데이터를 불러오는 중입니다...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/supabase-auth.js"></script>
  <script src="js/admin-inbody-ranking.js"></script>
</body>
</html>
