<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 — 건강지킴이</title>
  <meta name="description" content="나의 운동 통계 대시보드. 주간/월간 운동 차트와 목표 달성률을 확인하세요.">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* Streak section */
    .streak-section {
      display: flex;
      align-items: center;
      gap: 16px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      color: white;
      margin-bottom: 20px;
    }
    .streak-flame {
      font-size: 3rem;
      line-height: 1;
      animation: flamePulse 1.5s ease-in-out infinite;
    }
    @keyframes flamePulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.1) rotate(-5deg); }
    }
    .streak-info h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .streak-info .streak-count {
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      margin: 2px 0;
    }
    .streak-info p {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.6);
    }
    .streak-cta {
      margin-left: auto;
      flex-shrink: 0;
    }

    /* Hero stats */
    .hero-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .hero-stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .streak-section { flex-direction: column; text-align: center; gap: 12px; padding: 16px; }
      .streak-cta { margin-left: 0; width: 100%; }
      .streak-cta .btn { width: 100%; }
      .streak-flame { font-size: 2.2rem; }
      .streak-info .streak-count { font-size: 2.2rem; }
    }

    /* ── 개인 운동 현황 그리드 ── */
    .custom-ex-chart-grid {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 20px;
      align-items: stretch;
    }

    .custom-ex-chart-wrap {
      height: 360px;
    }

    .custom-ex-summary {
      height: 360px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-2);
      padding: 16px;
      box-sizing: border-box;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    @media (max-width: 900px) {
      .custom-ex-chart-grid {
        grid-template-columns: 1fr;
      }
      .custom-ex-chart-wrap {
        height: 260px;
      }
      .custom-ex-summary {
        height: auto;
        max-height: 220px;
      }
    }

    @media (max-width: 600px) {
      .custom-ex-chart-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .custom-ex-chart-wrap {
        height: 200px;
      }
      .custom-ex-summary {
        height: auto;
        max-height: 180px;
        padding: 12px;
        font-size: 0.82rem;
      }
    }

    /* Weekly checklist */
    .week-grid {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .week-day {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .week-day-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .week-day-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      transition: all 0.3s;
      position: relative;
    }
    .week-day-dot.done {
      background: var(--primary);
      color: white;
      box-shadow: 0 3px 10px rgba(0,70,128,0.3);
    }
    .week-day-dot.today {
      border: 2px solid var(--gold);
    }
    .week-day-dot.done.today {
      background: var(--gold);
      color: var(--primary-dark);
      border-color: var(--gold);
      box-shadow: 0 3px 10px rgba(221,202,75,0.4);
    }
    .week-date-label {
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    /* Goal rings */
    .goal-rings-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .goal-ring-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .ring-canvas-wrap {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .ring-canvas-wrap canvas {
      width: 80px !important;
      height: 80px !important;
    }
    .ring-center-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .ring-pct {
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--text);
    }
    .ring-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
    }
    .ring-val {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Chart cards */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .chart-card-header {
      padding: 18px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chart-card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chart-card-body {
      padding: 16px 20px 20px;
    }

    /* Filter buttons */
    .filter-btns {
      display: flex;
      gap: 4px;
    }
    .filter-btn {
      padding: 5px 12px;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      background: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }


    /* Best records — 가로 그리드 */
    .best-records-list {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    .best-record-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
      padding: 18px 12px 14px;
      background: var(--surface-2);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .best-record-item:hover {
      border-color: rgba(0,70,128,0.2);
      box-shadow: var(--shadow-sm);
      transform: translateY(-2px);
    }
    .best-record-rank {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .rank-1 { background: rgba(221,202,75,0.2); }
    .rank-2 { background: rgba(192,207,216,0.35); }
    .rank-3 { background: rgba(205,127,50,0.15); }

    .best-record-info { width: 100%; }
    .best-record-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .best-record-val {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .best-record-unit { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; }
    .best-record-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    @media (max-width: 900px) {
      .best-records-list { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .best-records-list { grid-template-columns: repeat(2, 1fr); }
    }

    /* Recent activity */
    .activity-list { display: flex; flex-direction: column; gap: 8px; }
    .activity-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      transition: background 0.15s;
      cursor: pointer;
      text-decoration: none;
    }
    .activity-row:hover { background: var(--surface-2); }
    .activity-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }
    .activity-date { font-size: 0.82rem; color: var(--text-secondary); min-width: 90px; }
    .activity-summary { font-size: 0.82rem; color: var(--text); flex: 1; }
    .activity-cond { font-size: 0.78rem; }

    /* No data placeholder */
    .chart-no-data {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 180px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .chart-no-data .no-data-icon { font-size: 2.5rem; margin-bottom: 8px; opacity: 0.4; }

    /* ── Month Navigator ── */
    .month-nav-btn {
      width: 30px; height: 30px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      cursor: pointer;
      font-size: 0.72rem;
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .month-nav-btn:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(0,70,128,0.05);
    }

    /* ── Monthly Calendar ── */
    .cal-hdr-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 4px;
    }
    .cal-hdr {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      padding: 4px 0;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 1fr;
      gap: 3px;
    }
    .cal-cell {
      border-radius: 7px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      position: relative;
      transition: all 0.15s;
    }
    .cal-cell.cal-has {
      background: rgba(0,70,128,0.07);
      cursor: pointer;
    }
    .cal-cell.cal-has:hover {
      background: rgba(0,70,128,0.14);
      transform: scale(1.06);
    }
    .cal-cell.cal-today {
      border: 2px solid var(--gold);
    }
    .cal-cell.cal-future { opacity: 0.3; pointer-events: none; }
    .cal-num {
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1;
      color: var(--text-secondary);
    }
    .cal-cond-emoji { font-size: 0.68rem; line-height: 1; }
    .cal-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--primary);
    }
    /* 범례 */
    .cal-legend {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 4px;
      vertical-align: middle;
      margin-right: 2px;
    }
    .cal-legend.cal-has  { background: rgba(0,70,128,0.12); border: 1px solid rgba(0,70,128,0.2); }
    .cal-legend.cal-today { border: 2px solid var(--gold); }

    @media (max-width: 900px) {
      .hero-stats-grid { grid-template-columns: repeat(2, 1fr); }
      .goal-rings-grid { grid-template-columns: repeat(4, 1fr); }
      #monthlyView > div { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 600px) {
      .hero-stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .goal-rings-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .ring-canvas-wrap { width: 64px; height: 64px; }
      .ring-canvas-wrap canvas { width: 64px !important; height: 64px !important; }
      .ring-pct { font-size: 0.8rem; }
      .ring-label { font-size: 0.65rem; }
      .best-records-list { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .best-record-item { padding: 14px 10px 12px; }
      .chart-wrap { height: 160px; }
      .chart-card-header { flex-wrap: wrap; gap: 8px; }
      .chart-card-header .filter-btns { margin-left: 0; }
      .week-grid { gap: 4px; }
      .week-day-dot { width: 30px; height: 30px; font-size: 0.7rem; }
      .week-day-label { font-size: 0.65rem; }
      .week-date-label { font-size: 0.6rem; }
      .activity-date { min-width: 70px; font-size: 0.78rem; }
      .activity-summary { font-size: 0.78rem; }
    }

  </style>
</head>
